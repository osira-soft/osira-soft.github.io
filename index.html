<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>osira-soft</title>
  <meta name="description" content="osira-soft が開発する macOS / iOS アプリの一覧です。">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="header-logo">osira-soft</a>
    <nav>
      <a href="https://github.com/osira-soft">GitHub</a>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="ja">JP</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </nav>
  </div>
</header>

<main class="page">
  <div class="top-hero">
    <h1 data-en="Simple,&lt;br&gt;easy-to-use apps.">シンプルで、<br>使いやすいアプリを。</h1>
    <p data-en="Developing utility apps for macOS and iOS.">macOS / iOS 向けのユーティリティアプリを開発しています。</p>
  </div>

  <div class="apps-section">
    <h2>Apps</h2>
    <div class="app-list">

      <a href="cmdlang/index.html" class="app-card">
        <img src="cmdlang/icon.png" alt="CmdLang" class="app-icon">
        <div class="app-info">
          <h3>CmdLang</h3>
          <p data-en="A menu bar utility that switches input sources using left/right Command keys.">左右の Command キーで入力ソースを切り替えるメニューバーユーティリティ</p>
        </div>
        <div class="app-meta">
          <span class="badge macos">macOS</span>
          <span class="arrow">›</span>
        </div>
        <span class="app-updated" data-en="Updated: 2026-03-17">最終更新：2026-03-17</span>
      </a>

      <a href="tidescope/index.html" class="app-card">
        <img src="tidescope/icon.png" alt="TideScope" class="app-icon">
        <div class="app-info">
          <h3>TideScope</h3>
          <p data-en="Real-time tide info from 238 JMA stations — high/low tides, tidal cycles, and more.">気象庁全国238観測局の潮位データをもとに、満潮・干潮・潮回りをリアルタイムで確認</p>
        </div>
        <div class="app-meta">
          <span class="badge ios">iOS</span>
          <span class="arrow">›</span>
        </div>
        <span class="app-updated" data-en="Updated: 2026-03-16">最終更新：2026-03-16</span>
      </a>

      <!-- 今後のアプリはここに追加 -->

    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>© 2026 osira-soft</span>
    <div class="footer-links">
      <a href="https://github.com/osira-soft">GitHub</a>
    </div>
  </div>
</footer>

<script src="lang.js"></script>
</body>
</html>
