<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>osira-soft</title>
  <meta name="description" content="osira-soft が開発する macOS / iOS アプリの一覧です。">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="header-logo">osira-soft</a>
    <nav>
      <a href="https://github.com/osira-soft">GitHub</a>
    </nav>
  </div>
</header>

<main class="page">
  <div class="top-hero">
    <h1>シンプルで、<br>使いやすいアプリを。</h1>
    <p>macOS / iOS 向けのユーティリティアプリを開発しています。</p>
  </div>

  <div class="apps-section">
    <h2>Apps</h2>
    <div class="app-list">

      <a href="cmdlang/index.html" class="app-card">
        <img src="cmdlang/icon.png" alt="CmdLang" class="app-icon">
        <div class="app-info">
          <h3>CmdLang</h3>
          <p>左右の Command キーで入力ソースを切り替えるメニューバーユーティリティ</p>
        </div>
        <div class="app-meta">
          <span class="badge macos">macOS</span>
          <span class="app-updated">更新 2026-03-15</span>
          <span class="arrow">›</span>
        </div>
      </a>

      <a href="tidescope/index.html" class="app-card">
        <img src="tidescope/icon.png" alt="TideScope" class="app-icon">
        <div class="app-info">
          <h3>TideScope</h3>
          <p>気象庁全国238観測局の潮位データをもとに、満潮・干潮・潮回りをリアルタイムで確認</p>
        </div>
        <div class="app-meta">
          <span class="badge ios">iOS</span>
          <span class="app-updated">更新 2026-03-16</span>
          <span class="arrow">›</span>
        </div>
      </a>

      <!-- 今後のアプリはここに追加 -->

    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>© 2026 osira-soft</span>
    <div class="footer-links">
      <a href="https://github.com/osira-soft">GitHub</a>
    </div>
  </div>
</footer>

</body>
</html>
